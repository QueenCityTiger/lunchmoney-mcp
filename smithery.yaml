# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['build/index.js'], env: { LUNCHMONEY_API_TOKEN: config.lunchmoneyApiToken } })
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - lunchmoneyApiToken
    properties:
      lunchmoneyApiToken:
        type: string
        description: LunchMoney API token for authentication
  exampleConfig:
    lunchmoneyApiToken: YOUR_API_TOKEN
